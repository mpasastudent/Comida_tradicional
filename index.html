<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>comida-tradicional-ecuatoriana</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
   <!-----contactos-->
 <section class="bg-white dark:bg-gray-900 py-12 px-4 sm:px-6 lg:px-8">
  <div class="container mx-auto max-w-6xl">
    <p class="font-medium text-blue-600 dark:text-blue-400">Contáctanos</p>
    <h1 class="mt-2 text-3xl font-bold text-gray-900 dark:text-white">¡Habla con nosotros!</h1>
    <p class="mt-3 text-gray-500 dark:text-gray-400">
      Estamos aquí para ayudarte. Envía tus datos o escríbenos directamente para mas informacion
    </p>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-8">
      <!-- Datos sin íconos -->
      <div class="space-y-6">
        <div>
          <h3 class="text-base font-medium text-gray-900 dark:text-white">Email</h3>
          <p class="mt-2 text-gray-500 dark:text-gray-400">Nuestro equipo te responderá pronto</p>
          <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">comida-tradicional-ecuatoriana@gmail.com</p>
        </div>
        <div>
          <h3 class="text-base font-medium text-gray-900 dark:text-white">Teléfono</h3>
          <p class="mt-2 text-gray-500 dark:text-gray-400">Lunes a Viernes de 8:00 a 17:00</p>
          <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">0999 8880 6666</p>
        </div>
      </div>

      <!-- Formulario -->
      <form class="space-y-4">
        <input type="text" placeholder="Tu nombre" class="w-full p-2 border rounded dark:bg-gray-800 dark:border-gray-700">
        <input type="email" placeholder="Tu correo" class="w-full p-2 border rounded dark:bg-gray-800 dark:border-gray-700">
        <textarea placeholder="Tu mensaje" rows="4" class="w-full p-2 border rounded dark:bg-gray-800 dark:border-gray-700"></textarea>
        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">Enviar</button>
      </form>
    </div>
  </div>
</section>
  </body>
</html>
